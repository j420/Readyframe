name: DeployGrade Pilot Sandbox
on:
  workflow_dispatch:
    inputs:
      pilot_job_id: {required: true, type: string}
      blueprint_hash: {required: true, type: string}
      callback_url: {required: true, type: string}
jobs:
  pilot:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - name: Emit constrained Pilot start
        env: {PILOT_CALLBACK_SECRET: ${{ secrets.PILOT_CALLBACK_SECRET }}}
        run: |
          body='{"event_type":"PILOT_STARTED","pilot_job_id":"${{ inputs.pilot_job_id }}","blueprint_hash":"${{ inputs.blueprint_hash }}"}'
          signature=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$PILOT_CALLBACK_SECRET" -hex | sed 's/^.* //')
          curl --fail --silent --show-error -X POST "${{ inputs.callback_url }}" -H 'content-type: application/json' -H "x-deploygrade-signature: $signature" --data "$body"
