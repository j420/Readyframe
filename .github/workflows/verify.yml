name: Verify

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verification:
    name: Deterministic verification (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mandatory repository hook
        run: make bootstrap
      - name: Verify artifacts and deterministic behavior
        run: make verify
      - name: Run adversarial checks
        run: make redteam
      - name: Validate Vercel static deployment inputs
        run: make verify-static-site

      - name: Validate configured deployed preview
        if: ${{ vars.DEPLOYGRADE_DEPLOYED_URL != '' }}
        env:
          DEPLOYGRADE_DEPLOYED_URL: ${{ vars.DEPLOYGRADE_DEPLOYED_URL }}
        run: make verify-deployed
